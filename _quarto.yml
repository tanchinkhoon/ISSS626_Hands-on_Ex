format:
  html:
    # --- Outline / TOC defaults (apply to all pages) ---
    toc: true                # show outline
    toc-title: "On this page"
    toc-location: right      # left | right
    toc-depth: 3             # include ### headings and above
    number-sections: true    # 1, 1.1, 1.2 numbering
    page-navigation: true    # Previous / Next links at bottom
    smooth-scroll: true      # nice scrolling when clicking TOC
    css: styles.css
    

